name: Release

on:
  push:
    branches:
      - main
    paths:
      - "crates/sem-core/Cargo.toml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version
        id: detect
        run: |
          VERSION=$(grep '^version' crates/sem-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$VERSION detected"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  semver-check:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks

      - name: Find previous tag
        id: baseline
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check semver compatibility
        run: cargo semver-checks -p sem-core --baseline-rev ${{ steps.baseline.outputs.tag }}

  create-tag:
    needs: [check-version, semver-check]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

  build:
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: sem-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: sem-linux-arm64
            cross_package: gcc-aarch64-linux-gnu
            cross_linker: aarch64-linux-gnu-gcc
            vendor_openssl: true
          - target: aarch64-apple-darwin
            os: macos-14
            name: sem-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            name: sem-darwin-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: sem-windows-x86_64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        if: matrix.cross_package != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_package }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure cargo for cross-compilation
        if: matrix.cross_linker != ''
        run: |
          mkdir -p ~/.cargo
          echo "[target.${{ matrix.target }}]" >> ~/.cargo/config.toml
          echo "linker = \"${{ matrix.cross_linker }}\"" >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p sem-cli ${{ matrix.vendor_openssl && '--features vendored-openssl' || '' }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz sem
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/sem.exe -DestinationPath ${{ matrix.name }}.zip
          tar -czf ${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release sem.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            crates/${{ matrix.name }}.tar.gz
            crates/${{ matrix.name }}.zip

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
            *.tar.gz
            *.zip
            checksums.txt

  publish-npm:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync npm package version
        run: node ./scripts/sync-package-version.mjs "${{ needs.check-version.outputs.version }}"

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Publish npm package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish sem-core
        run: cargo publish -p sem-core || echo "sem-core already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish sem-mcp
        run: cargo publish -p sem-mcp || echo "sem-mcp already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish sem-cli
        run: cargo publish -p sem-cli || echo "sem-cli already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
